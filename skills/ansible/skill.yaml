name: Ansible
description: >
  Skills for managing Ansible automation: running playbooks, executing
  ad-hoc commands, listing inventory, checking playbook syntax, and
  pinging hosts.
version: "1.0.0"
tools:
  - name: run_playbook
    description: Run an Ansible playbook against an inventory.
    parameters:
      playbook:
        type: string
        description: Absolute path to the playbook YAML file.
        required: true
      inventory:
        type: string
        description: >
          Inventory file path, directory, or comma-separated host list
          (e.g. "host1,host2," for a literal host list).
        required: false
      extra_vars:
        type: object
        description: Extra variables passed to the playbook as --extra-vars (optional).
        required: false
      tags:
        type: array
        items:
          type: string
        description: Limit execution to specific tags (optional).
        required: false
      skip_tags:
        type: array
        items:
          type: string
        description: Tags to skip during execution (optional).
        required: false
      limit:
        type: string
        description: Limit execution to a subset of hosts (optional).
        required: false
      verbose:
        type: boolean
        description: Enable verbose output (-v) (default false).
        required: false

  - name: run_adhoc_command
    description: Run an Ansible ad-hoc command on target hosts.
    parameters:
      hosts:
        type: string
        description: Host pattern (e.g. "all", "web", "192.168.1.1").
        required: true
      module:
        type: string
        description: Ansible module to use (e.g. "shell", "command", "copy", "ping").
        required: true
      args:
        type: string
        description: Module arguments string (e.g. "ls /tmp" for shell module).
        required: false
      inventory:
        type: string
        description: Inventory file path or comma-separated host list.
        required: false

  - name: list_inventory
    description: List all hosts and groups in an Ansible inventory.
    parameters:
      inventory:
        type: string
        description: Inventory file path or directory.
        required: true

  - name: check_playbook_syntax
    description: Check the syntax of an Ansible playbook without executing it.
    parameters:
      playbook:
        type: string
        description: Absolute path to the playbook YAML file.
        required: true
      inventory:
        type: string
        description: Inventory file path (optional, uses localhost if omitted).
        required: false

  - name: ping_hosts
    description: Ping target hosts using the Ansible ping module to verify connectivity.
    parameters:
      hosts:
        type: string
        description: Host pattern (e.g. "all", "web", "db").
        required: true
      inventory:
        type: string
        description: Inventory file path or comma-separated host list.
        required: false
